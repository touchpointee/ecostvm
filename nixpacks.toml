# Install Chromium for whatsapp-web.js (Puppeteer) on Coolify/Docker
[phases.setup]
aptPkgs = [
  "chromium-browser",
  "libnss3",
  "libatk-bridge2.0-0",
  "libdrm2",
  "libgbm1",
  "libasound2t64",
  "libx11-xcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "fonts-liberation",
  "libappindicator3-1",
  "xdg-utils"
]

# Run a post-install check so we know the path at build time
[phases.build]
cmds = [
  "which chromium-browser || which chromium || echo 'WARNING: chromium not found in PATH'",
  "ls -la /usr/bin/chrom* 2>/dev/null || echo 'WARNING: no chromium binary under /usr/bin'",
  "npm run build"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"
